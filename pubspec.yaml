name: kline_trainer
description: K线训练营App - 帮助用户学习和练习股票K线分析的教育类应用
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.3.0
  riverpod_annotation: ^2.1.0

  # 路由
  go_router: ^12.0.0

  # 图表
  fl_chart: ^0.65.0

  # 网络
  dio: ^5.4.0

  # 数据库
  drift: ^2.11.0
  sqlite3_flutter_libs: ^0.6.0

  # 工具
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  path: ^1.8.3
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  json_annotation: ^4.8.0
  logger: ^2.0.0
  
  # 安全
  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0

  # 缓存
  redis: ^4.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI组件
  flutter_svg: ^2.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  riverpod_generator: ^2.2.0
  drift_dev: ^2.11.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
    - assets/data/stock_data/
    - .env


